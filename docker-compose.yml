version: "3.9"

services:
  nostalgiabot:
    build: .
    container_name: nostalgia-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env

    networks:
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nostalgiabot.rule=Host(`barmenu.ashhuston.com`)"
      - "traefik.http.routers.nostalgiabot.entrypoints=websecure"
      - "traefik.http.routers.nostalgiabot.tls.certresolver=letsencrypt"

networks:
  proxy:
    external: true
